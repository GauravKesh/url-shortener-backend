openapi: 3.0.3
info:
  title: URL Shortener Backend API
  version: 1.0.0
  description: API specification for the URL shortener backend.
servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        requestId:
          type: string
        data:
          type: object
          nullable: true
          additionalProperties: true
      required:
        - success
        - message
        - requestId
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        requestId:
          type: string
        code:
          type: string
        message:
          type: string
      required:
        - success
        - requestId
        - code
        - message
    Pagination:
      type: object
      properties:
        total:
          type: number
        limit:
          type: number
        offset:
          type: number

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "503":
